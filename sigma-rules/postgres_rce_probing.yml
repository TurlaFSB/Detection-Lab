title: PostgreSQL Command Execution Function Probing
id: 5a7b9c1d-2e4f-4a6b-9c8d-1e3f5a7b9c2d
status: experimental
description: Detects probing for non-existent command-execution functions and unauthorized file writes via COPY, indicating reconnaissance for RCE primitives before a working exploitation path is found
author: TurlaFSB
date: 2026-07-06
logsource:
    product: postgresql
    category: application
detection:
    keywords:
        - 'function shell_out'
        - 'STATEMENT:  COPY'
    condition: keywords
falsepositives:
    - Legitimate use of COPY for data export/import
level: medium
tags:
    - attack.discovery
    - attack.t1082