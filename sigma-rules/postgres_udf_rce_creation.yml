title: PostgreSQL Malicious C Language Function Creation Attempt
id: 3e8f1a2b-4c6d-4e91-9a2f-7b1c3d4e5f6a
status: experimental
description: Detects creation of a PostgreSQL function using LANGUAGE C pointing to a shared object in /tmp, consistent with UDF-based RCE attempts (e.g. Metasploit postgres_payload)
references:
    - https://www.postgresql.org/docs/8.3/sql-createfunction.html
author: TurlaFSB
date: 2026-07-06
logsource:
    product: postgresql
    category: application
detection:
    keywords:
        - 'STATEMENT:  create or replace function'
        - 'language c strict immutable'
    condition: keywords
falsepositives:
    - Legitimate C extension development or testing against /tmp paths
level: critical
tags:
    - attack.execution
    - attack.t1190
    - attack.t1059