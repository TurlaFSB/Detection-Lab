title: Shell Process Spawned by IRC Daemon
id: c4e9f3a2-6b1d-4c8e-a7f4-3d2b9e5c1a8f
status: experimental
description: |
    Detects a shell process (sh, bash, dash) spawned as a direct child of
    an IRC daemon process (ircd, unrealircd). This is the host-based
    counterpart to network-layer detection of CVE-2010-2075. Under normal
    operation, ircd never spawns interactive shells. Requires auditd with
    execve syscall monitoring enabled — not applicable to agentless-only
    SIEM deployments.
author: Pranav (TurlaFSB)
date: 2025/06/24
references:
    - https://nvd.nist.gov/vuln/detail/CVE-2010-2075
tags:
    - attack.execution
    - attack.t1059.004
    - attack.t1059
logsource:
    category: process_creation
    product: linux
detection:
    selection:
        ParentImage|contains:
            - 'ircd'
            - 'unrealircd'
        Image|endswith:
            - '/sh'
            - '/bash'
            - '/dash'
    condition: selection
falsepositives:
    - None expected — IRC daemons have no legitimate reason to spawn shells
level: critical